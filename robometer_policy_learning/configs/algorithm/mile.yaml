# Basic MILE parameters
learning_starts: 0
batch_size: 256
num_updates_per_train_step: 1

# Optimizer
actor_optimizer_lr: 1.0e-4
actor_optimizer_eps: 1.0e-8
actor_optimizer_weight_decay: 0.0

# MILE-specific
intervention_action_loss_type: "nll"  # ["mse", "nll", "huber", "smooth_l1"]
lambda_intervention: 1.0               # convex weight of the probit BCE loss
intervention_cost: 1.0                 # probit threshold offset c
probit_scale: 0.1                      # probit scale beta
monte_carlo_samples: 50                # K samples for the probit MC estimate
condition_intervention_on_action: false  # use the observed human action a_h on intervention steps
stop_gradient_for_monte_carlo_samples: true  # stop gradient for monte carlo samples of the training policy

# Running-stats normalization of the probit log-prob gap (decouples probit_scale/intervention_cost
# from the absolute scale of the log-probabilities; standardizes the gap before the Gaussian CDF).
normalize_logprob_gaps: false          # true => standardize the log-prob gap by its EMA mean/std
logprob_gap_ema_decay: 0.99            # EMA decay for the running gap mean/variance
logprob_gap_norm_eps: 1.0e-6           # variance floor before sqrt
logprob_gap_std_min: 0.1               # lower bound on the normalization std
logprob_gap_clip: 5.0                  # clip standardized gap to +/- this (<= 0 disables)

# Regularization / anti-overfitting (parity with BC)
l2_regularization: 0.0
obs_noise_std: 0.0
action_noise_std: 0.0
gradient_penalty_weight: 0.0
consistency_weight: 0.0
clip_grad_norm: 10.0
