defaults:
  - algorithm@offline_algorithm: bc # Options: iql, bc
  - reward_model: null # Options: null, robometer
  - policy@policy: mlp # Options: mlp, rnn, transformer

# Debug mode
debug: false

# Environment configuration
env:
  env_name: "robomimic"  # task/robot/controller are read from the robomimic dataset metadata
  h5_dataset_path: "data/robomimic_datasets/robomimic_image/lift/ph/image_converted.hdf5"  # robomimic .h5 to reconstruct the env from
  max_episode_steps: 400 # max episode steps for the environment
  use_full_state: false  # Use the full state (default: False). If False, only proprioceptive information will be used. If True, no reward relabeling will be performed.
  use_gt_rewards: true # Use ground truth rewards (default: False). If True, no reward relabeling will be performed. If no reward model is provided, this will be set to True.
  dino_image_keys: ["agentview_image"] # keys for dino conversion in observation
  extra_keys_to_drop: ["robot0_eye_in_hand_image", "prompt", "language"] # keys to drop from observation beyond image_keys (default: [])
  success_bonus_amount: 0.0

# Training configuration
training:
  num_envs: 1 # Number of parallel environments
  chunk_size: null # Action chunking size
  n_action_steps: 1 # Actions executed open-loop per predicted chunk before replanning (<= chunk_size)
  use_rnn: false  # Use RNN actor and critic
  num_offline_steps: 10_000  # Number of offline training steps
  load_dir: null  # Directory to load RL models from (null for no loading)
  save_interval: 10000  # Save interval in steps
  continue_training: false  # Continue training from the last checkpoint
  seed: 0  # Random seed for training
  use_image_transforms: false  # Apply image augmentation transforms when sampling from the replay buffer
  normalize_lowdim_obs: false  # Z-score low-dim obs using dataset stats computed at buffer init

# Logging configuration
logging:
  wandb_project: mile_dp
  wandb_entity: tri
  wandb_offline: false
  wandb_log_dir_base: logs/wandb
  wandb_name: "train_rl"
  log_level: "INFO"

# Algorithm configuration
alg:
  offline_alg_name: bc  # Offline algorithm name (iql, bc, sac)

# Evaluation configuration
eval:
  eval_freq: 1000   # Evaluation frequency in rollouts
  eval_num_episodes: 20  # Number of episodes for evaluation
  eval_record_video: true  # Whether to record videos during evaluation
  eval_on_first_step: true  # If true, evaluate on the first step before any training

# Model configuration
model:
  dinov2_model: "facebook/dinov2-base"
  sentence_model: null
  # Featurizer-level image encoding. When `type` is null, images are handled by precomputing DINO embedding.
  image_encoder:
    type: null  # null | impala | resnet | dinov2
    finetune: false
    image_feature_dim: 128
    resnet_backbone: ResNet18
    resnet_pretrained: true
    resnet_pool: spatial_softmax
    spatial_softmax_num_kp: 32
    impala_nn_scale: 1
    impala_num_blocks_per_stack: 2
    impala_use_smaller: false
    impala_output_dim: null
